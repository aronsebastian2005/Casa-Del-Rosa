<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Casa Del Rosa | Verify Email</title>
  <link rel="stylesheet" href="client.css"/>
</head>
<body class="auth-page auth-glass-page">
  <div class="auth-scene">
    <div class="auth-panel">
      <div class="auth-logo">
        <div class="auth-logo-mark">
          <span class="auth-logo-stem"></span>
          <span class="auth-logo-bloom"></span>
        </div>
        <div class="auth-logo-text">
          <span>Casa Del</span>
          <span>Rosa</span>
        </div>
      </div>

      <div class="auth-form-wrapper">
        <h1 class="auth-title">Verify Email</h1>

        <form id="verifyForm" class="auth-form">
          <div class="auth-field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Enter your email" required />
            <div class="field-message" id="emailMsg"></div>
            <div class="field-message" id="emailHint"></div>
          </div>

          <div class="auth-field">
            <label for="code">Verification Code</label>
            <input id="code" type="text" placeholder="Enter 6-digit code" maxlength="6" required />
            <div class="field-message" id="codeMsg"></div>
          </div>

          <button id="btnVerify" type="button" class="auth-submit">Verify</button>
          <button id="btnResend" type="button" class="auth-submit secondary-action">Resend Code</button>
        </form>

        <div class="msg auth-message" id="msg"></div>

        <div class="auth-footer">
          <p>Already verified? <a href="login.html">Back to login</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const msg = document.getElementById("msg");
    const emailMsg = document.getElementById("emailMsg");
    const emailHint = document.getElementById("emailHint");
    const codeMsg = document.getElementById("codeMsg");
    const emailInput = document.getElementById("email");

    function clearFieldMessages() {
      [emailMsg, codeMsg].forEach((element) => {
        element.textContent = "";
        element.className = "field-message";
      });
    }

    function setFieldMessage(element, text, type = "error") {
      element.textContent = text;
      element.className = `field-message ${type}`;
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value || "").trim());
    }

    const savedEmail = localStorage.getItem("verifyEmail");
    if (savedEmail && isValidEmail(savedEmail)) {
      emailInput.value = savedEmail;
      emailInput.readOnly = true;
      emailHint.textContent = "Using the email from your registration.";
      emailHint.className = "field-message success";
    } else if (savedEmail) {
      localStorage.removeItem("verifyEmail");
      emailInput.readOnly = false;
      emailHint.textContent = "Please enter the email you used when registering.";
      emailHint.className = "field-message";
    }

    document.getElementById("btnVerify").addEventListener("click", async () => {
      clearFieldMessages();
      msg.textContent = "Verifying...";

      try {
        const email = emailInput.value.trim().toLowerCase();
        const code = document.getElementById("code").value.trim();

        if (!email) {
          setFieldMessage(emailMsg, "Please enter your email.");
          msg.textContent = "";
          return;
        }

        if (!code) {
          setFieldMessage(codeMsg, "Please enter the 6-digit code.");
          msg.textContent = "";
          return;
        }

        const data = await apiFetch("/api/auth/verify-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, code })
        });

        msg.textContent = data.message || "Email verified.";
        localStorage.removeItem("verifyEmail");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1000);
      } catch (e) {
        if (/email/i.test(e.message)) {
          setFieldMessage(emailMsg, e.message);
          msg.textContent = "";
          return;
        }

        if (/code/i.test(e.message) || /verification/i.test(e.message)) {
          setFieldMessage(codeMsg, e.message);
          msg.textContent = "";
          return;
        }

        msg.textContent = e.message;
      }
    });

    document.getElementById("btnResend").addEventListener("click", async () => {
      clearFieldMessages();
      msg.textContent = "Sending new code...";

      try {
        const email = emailInput.value.trim().toLowerCase();

        if (!email) {
          setFieldMessage(emailMsg, "Please enter your email.");
          msg.textContent = "";
          return;
        }

        const data = await apiFetch("/api/auth/resend-code", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });

        setFieldMessage(emailMsg, data.message || "New code sent to this email.", "success");
        msg.textContent = data.message || "New code sent.";
      } catch (e) {
        if (/email/i.test(e.message)) {
          setFieldMessage(emailMsg, e.message);
          msg.textContent = "";
          return;
        }

        msg.textContent = e.message;
      }
    });
  </script>
</body>
</html>
